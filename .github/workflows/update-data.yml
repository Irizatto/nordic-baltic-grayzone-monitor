name: Automated data update

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/*.py"
      - "docs/js/map.js"
      - "docs/index.html"
      - "docs/css/style.css"
      - ".github/workflows/update-data.yml"
  schedule:
    - cron: "0 0,6,12,18 * * *" # AIS refresh every 6 hours UTC
    - cron: "30 0,12 * * *" # GFW SAR refresh and rescoring every 12 hours UTC
    - cron: "30 5,6 * * *" # one run maps to 08:30 Europe/Helsinki across DST

permissions:
  contents: write

concurrency:
  group: nbgm-data-update
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GFW_API_TOKEN: ${{ secrets.GFW_API_TOKEN }}
      BARENTSWATCH_CLIENT_ID: ${{ secrets.BARENTSWATCH_CLIENT_ID }}
      BARENTSWATCH_CLIENT_SECRET: ${{ secrets.BARENTSWATCH_CLIENT_SECRET }}
      USE_MOCK_DATA: "false"
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pipeline dependencies
        run: pip install -r requirements.txt

      - name: Select the scheduled stage
        id: mode
        shell: bash
        run: |
          schedule='${{ github.event.schedule }}'
          event_name='${{ github.event_name }}'
          run_pipeline=false
          pipeline_args=''
          run_reports=false
          case "$schedule" in
            '0 0,6,12,18 * * *')
              run_pipeline=true
              pipeline_args='--ais-only'
              ;;
            '30 0,12 * * *')
              run_pipeline=true
              pipeline_args='--sar-only'
              ;;
            '30 5,6 * * *')
              if [ "$(TZ=Europe/Helsinki date +%H)" = "08" ]; then
                run_reports=true
              fi
              ;;
            '')
              run_pipeline=true
              if [ "$event_name" = "push" ]; then
                pipeline_args='--ais-only'
              fi
              ;;
          esac
          echo "run_pipeline=$run_pipeline" >> "$GITHUB_OUTPUT"
          echo "pipeline_args=$pipeline_args" >> "$GITHUB_OUTPUT"
          echo "run_reports=$run_reports" >> "$GITHUB_OUTPUT"

      - name: Preserve published outputs before refresh
        run: |
          mkdir -p /tmp/nbgm-backup
          mkdir -p /tmp/nbgm-backup/layers
          cp docs/data/data.json /tmp/nbgm-backup/data.json
          cp docs/data/metadata.json /tmp/nbgm-backup/metadata.json
          cp data/events/events.csv /tmp/nbgm-backup/events-canonical.csv
          cp docs/data/events.json /tmp/nbgm-backup/events.json
          cp docs/data/events.csv /tmp/nbgm-backup/events-static.csv
          cp docs/data/layers/*.geojson /tmp/nbgm-backup/layers/
          if [ -f docs/data/infrastructure_metadata.json ]; then
            cp docs/data/infrastructure_metadata.json /tmp/nbgm-backup/infrastructure_metadata.json
          fi
          if [ -f docs/data/helcom_metadata.json ]; then
            cp docs/data/helcom_metadata.json /tmp/nbgm-backup/helcom_metadata.json
          fi
          if [ -f data/processed/ais_history.jsonl ]; then
            cp data/processed/ais_history.jsonl /tmp/nbgm-backup/ais_history.jsonl
          fi

      - name: Validate pipeline before touching published data
        id: validation
        continue-on-error: true
        run: |
          python -m compileall -q src
          python -m unittest discover -s tests
          python -c "import sys; sys.path.insert(0, 'src'); import generate_dashboard_data, generate_reports"

      - name: Refresh public EMODnet infrastructure snapshots
        id: infrastructure
        if: steps.mode.outputs.run_pipeline == 'true' && steps.validation.outcome == 'success'
        continue-on-error: true
        run: python src/fetch_emodnet_layers.py

      - name: Refresh public HELCOM MPA snapshot
        id: helcom
        if: steps.mode.outputs.run_pipeline == 'true' && steps.validation.outcome == 'success'
        continue-on-error: true
        run: python src/fetch_helcom_layers.py

      - name: Validate refreshed infrastructure snapshots
        id: infrastructure_validation
        if: steps.mode.outputs.run_pipeline == 'true' && steps.validation.outcome == 'success' && steps.infrastructure.outcome == 'success' && steps.helcom.outcome == 'success'
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          layer_dir = Path("docs/data/layers")
          for name in ("cables", "pipelines", "ports", "windfarms", "sensitive_areas", "helcom_mpas"):
              path = layer_dir / f"{name}.geojson"
              payload = json.loads(path.read_text(encoding="utf-8"))
              if payload.get("type") != "FeatureCollection" or not isinstance(payload.get("features"), list):
                  raise ValueError(f"{path} is not a valid GeoJSON FeatureCollection")
              print(f"Validated {path}: {len(payload['features'])} features")
          PY

      - name: Restore infrastructure snapshots on unexpected adapter failure
        if: steps.infrastructure.outcome == 'failure'
        run: |
          for name in cables pipelines ports windfarms; do
            cp "/tmp/nbgm-backup/layers/${name}.geojson" "docs/data/layers/${name}.geojson"
          done
          if [ -f /tmp/nbgm-backup/infrastructure_metadata.json ]; then
            cp /tmp/nbgm-backup/infrastructure_metadata.json docs/data/infrastructure_metadata.json
          fi
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          path = "docs/data/infrastructure_metadata.json"
          try:
              data = json.load(open(path, encoding="utf-8"))
          except (OSError, UnicodeDecodeError, json.JSONDecodeError):
              data = {"source": "emodnet_human_activities", "layers": {}, "fallbacks": []}
          data.update({
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "status": "error_kept_old_data",
              "detail": "Unexpected EMODnet adapter failure; previous infrastructure snapshots were retained."
          })
          data.setdefault("fallbacks", []).append(data["detail"])
          with open(path, "w", encoding="utf-8") as handle:
              json.dump(data, handle, indent=2, ensure_ascii=False)
              handle.write("\n")
          PY

      - name: Restore HELCOM snapshot on unexpected adapter failure
        if: steps.helcom.outcome == 'failure'
        run: |
          cp /tmp/nbgm-backup/layers/helcom_mpas.geojson docs/data/layers/helcom_mpas.geojson
          if [ -f /tmp/nbgm-backup/helcom_metadata.json ]; then
            cp /tmp/nbgm-backup/helcom_metadata.json docs/data/helcom_metadata.json
          fi
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          path = "docs/data/helcom_metadata.json"
          try:
              data = json.load(open(path, encoding="utf-8"))
          except (OSError, UnicodeDecodeError, json.JSONDecodeError):
              data = {"source": "helcom_mads", "fallbacks": []}
          data.update({
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "status": "error_kept_old_data",
              "detail": "Unexpected HELCOM adapter failure; previous MPA snapshot was retained."
          })
          data.setdefault("fallbacks", []).append(data["detail"])
          with open(path, "w", encoding="utf-8") as handle:
              json.dump(data, handle, indent=2, ensure_ascii=False)
              handle.write("\n")
          PY

      - name: Fetch selected sources, score, and generate dashboard data
        id: pipeline
        if: steps.mode.outputs.run_pipeline == 'true' && steps.validation.outcome == 'success'
        continue-on-error: true
        run: python src/generate_dashboard_data.py ${{ steps.mode.outputs.pipeline_args }}

      - name: Restore published data and record degraded status on pipeline failure
        if: steps.pipeline.outcome == 'failure'
        run: |
          cp /tmp/nbgm-backup/data.json docs/data/data.json
          cp /tmp/nbgm-backup/metadata.json docs/data/metadata.json
          cp /tmp/nbgm-backup/events-canonical.csv data/events/events.csv
          cp /tmp/nbgm-backup/events.json docs/data/events.json
          cp /tmp/nbgm-backup/events-static.csv docs/data/events.csv
          if [ -f /tmp/nbgm-backup/ais_history.jsonl ]; then
            cp /tmp/nbgm-backup/ais_history.jsonl data/processed/ais_history.jsonl
          fi
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          path = "docs/data/metadata.json"
          data = json.load(open(path, encoding="utf-8"))
          data.setdefault("source_status", {})["pipeline"] = {
              "status": "error_kept_old_data",
              "timestamp": datetime.now(timezone.utc).isoformat(),
              "detail": "Automated pipeline failed; previous dashboard data was retained."
          }
          with open(path, "w", encoding="utf-8") as handle:
              json.dump(data, handle, indent=2, ensure_ascii=False)
              handle.write("\n")
          PY

      - name: Generate daily and Monday weekly reports
        id: reports
        if: steps.mode.outputs.run_reports == 'true' && steps.validation.outcome == 'success'
        continue-on-error: true
        run: python src/generate_reports.py

      - name: Record report generation failure
        if: steps.reports.outcome == 'failure'
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          path = "docs/data/metadata.json"
          data = json.load(open(path, encoding="utf-8"))
          data.setdefault("source_status", {})["reports"] = {
              "status": "error_kept_old_data",
              "timestamp": datetime.now(timezone.utc).isoformat(),
              "detail": "Report generation failed; existing published reports were retained."
          }
          with open(path, "w", encoding="utf-8") as handle:
              json.dump(data, handle, indent=2, ensure_ascii=False)
              handle.write("\n")
          PY

      - name: Record validation failure
        if: steps.validation.outcome == 'failure'
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          path = "docs/data/metadata.json"
          data = json.load(open(path, encoding="utf-8"))
          data.setdefault("source_status", {})["pipeline"] = {
              "status": "error_kept_old_data",
              "timestamp": datetime.now(timezone.utc).isoformat(),
              "detail": "Pipeline validation failed; previous published data was left intact."
          }
          with open(path, "w", encoding="utf-8") as handle:
              json.dump(data, handle, indent=2, ensure_ascii=False)
              handle.write("\n")
          PY

      - name: Stage size-controlled outputs only
        shell: bash
        run: |
          git add docs/data/*.json || true
          git add docs/data/events.csv || true
          git add docs/data/layers/*.geojson || true
          git add data/events/events.csv || true
          if [ '${{ steps.reports.outcome }}' != 'failure' ]; then
            git add docs/reports/ || true
            git add docs/reports.html || true
          fi
          if [ '${{ steps.pipeline.outcome }}' != 'failure' ] && [ -f data/processed/ais_history.jsonl ]; then
            git add data/processed/ais_history.jsonl || true
          fi

      - name: Commit and push changed data
        run: |
          if git diff --cached --quiet; then
            echo "No allowed data changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "data: automated update $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi

      - name: Fail after safely publishing degraded status
        if: steps.validation.outcome == 'failure' || steps.infrastructure.outcome == 'failure' || steps.helcom.outcome == 'failure' || steps.infrastructure_validation.outcome == 'failure' || steps.pipeline.outcome == 'failure' || steps.reports.outcome == 'failure'
        run: exit 1

